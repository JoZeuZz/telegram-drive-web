# Rate-limit zone for login attempts — 5 req/min per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name telegram-drive.example.com;

    # Redirect all HTTP to HTTPS (uncomment when cert is ready)
    # return 301 https://$host$request_uri;

    # ── Frontend static files ────────────────────────────
    root /opt/telegram-drive-web/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Login — extra rate limiting ──────────────────────
    location = /api/app-auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
        client_max_body_size 1k;
    }

    # ── API reverse proxy ────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload size limit (512 MB)
        client_max_body_size 512m;

        # Streaming support
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeout for long uploads/downloads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}

