services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      FRONTEND_PORT: 80
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:?Set your public app URL, e.g. https://drive.example.com}
      DATA_DIR: /app/data
      CACHE_DIR: /app/data/cache
      COOKIE_SECURE: "true"
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
      SESSION_SECRET: ${SESSION_SECRET:?Set a strong random secret}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set an admin password}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?Set your Telegram API ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?Set your Telegram API HASH}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - tdw-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  tdw-data:
