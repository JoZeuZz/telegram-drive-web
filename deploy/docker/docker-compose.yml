services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"
    volumes:
      - tdw-data:/app/data
    environment:
      - APP_ENV=${APP_ENV:-development}
      - HOST=0.0.0.0
      - PORT=8080
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      - DATA_DIR=/app/data
      - CACHE_DIR=/app/data/cache
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-8}
      - APP_AUTH_RATE_LIMIT_MAX_REQUESTS=${APP_AUTH_RATE_LIMIT_MAX_REQUESTS:-10}
      - APP_AUTH_RATE_LIMIT_WINDOW_SECS=${APP_AUTH_RATE_LIMIT_WINDOW_SECS:-60}
      - TELEGRAM_AUTH_RATE_LIMIT_MAX_REQUESTS=${TELEGRAM_AUTH_RATE_LIMIT_MAX_REQUESTS:-5}
      - TELEGRAM_AUTH_RATE_LIMIT_WINDOW_SECS=${TELEGRAM_AUTH_RATE_LIMIT_WINDOW_SECS:-60}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-dev-session-secret}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-0}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - RUST_LOG=info
      - LOG_FORMAT=${LOG_FORMAT:-json}
    restart: unless-stopped

volumes:
  tdw-data:
