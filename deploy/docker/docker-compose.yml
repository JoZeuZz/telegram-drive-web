version: "3.8"

services:
  server:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"
    volumes:
      - tdw-data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATA_DIR=/app/data
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  tdw-data:
